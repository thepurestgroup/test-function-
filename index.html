<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>StockFlow — Admin Setup</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
body{font-family:system-ui,sans-serif;background:#f5f5f2;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border:1px solid #ddd;border-radius:12px;padding:32px;width:420px;text-align:center}
h2{font-size:18px;font-weight:600;margin-bottom:6px}
p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.6}
.btn{background:#111;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
.btn:disabled{opacity:0.4}
.success{color:#2d7a2d;background:#edf7ed;padding:12px;border-radius:8px;margin-top:16px;display:none;font-size:13px}
.error{color:#c0392b;background:#fdecea;padding:12px;border-radius:8px;margin-top:16px;display:none;font-size:13px}
</style></head><body>
<div class="box">
  <h2>StockFlow — Admin Setup</h2>
  <p>This will create the admin account in Firebase.<br>Run this <strong>once only</strong> then delete this page.</p>
  <button class="btn" id="btn" onclick="setup()">Create admin account</button>
  <div class="success" id="ok">&#10003; Admin account created! You can now log in at your StockFlow app.<br><br>Delete this setup page from GitHub now.</div>
  <div class="error" id="err"></div>
</div>
<script>
var cfg={apiKey:"AIzaSyCSq6rXAl7l8ZKVvgkv31opnUTUgbAJ_W0",authDomain:"stockflow-warehouse.firebaseapp.com",projectId:"stockflow-warehouse",storageBucket:"stockflow-warehouse.firebasestorage.app",messagingSenderId:"41703190908",appId:"1:41703190908:web:08ad10cab8e7c402fc74f9"};
firebase.initializeApp(cfg);
var db=firebase.firestore();
async function setup(){
  var btn=document.getElementById('btn');
  var ok=document.getElementById('ok');
  var err=document.getElementById('err');
  btn.disabled=true;
  try{
    // Check if admin already exists
    var existing=await db.collection('users').where('username','==','mingxuan.chai@thepurestgroup.com').get();
    if(!existing.empty){
      ok.style.display='block';
      ok.textContent='Admin account already exists! You can log in now.';
      return;
    }
    await db.collection('users').add({
      username:'mingxuan.chai@thepurestgroup.com',
      password:'Cmx90223264@!',
      role:'admin',
      created:new Date().toISOString()
    });
    ok.style.display='block';
  }catch(e){
    err.style.display='block';
    err.textContent='Error: '+e.message;
    btn.disabled=false;
  }
}
</script></body></html>
