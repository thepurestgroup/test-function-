<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>StockFlow TEST — Admin Setup</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
body{font-family:system-ui,sans-serif;background:#f5f5f2;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border:1px solid #ddd;border-radius:12px;padding:32px;width:420px;text-align:center}
h2{font-size:18px;margin-bottom:6px}
p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.6}
.btn{background:#111;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
.btn:disabled{opacity:0.4}
.success{color:#2d7a2d;background:#edf7ed;padding:12px;border-radius:8px;margin-top:16px;display:none;font-size:13px}
.error{color:#c0392b;background:#fdecea;padding:12px;border-radius:8px;margin-top:16px;display:none;font-size:13px}
</style></head><body>
<div class="box">
  <h2>StockFlow TEST — Admin Setup</h2>
  <p>Creates a test admin account in the <strong>test_users</strong> collection.<br>
  Username: <strong>admin</strong><br>Password: <strong>admin123</strong></p>
  <button class="btn" id="btn" onclick="setup()">Create test admin account</button>
  <div class="success" id="ok">&#10003; Done! Log in at your test site with:<br><br><strong>Username: admin</strong><br><strong>Password: admin123</strong></div>
  <div class="error" id="err"></div>
</div>
<script>
var cfg={apiKey:"AIzaSyCSq6rXAl7l8ZKVvgkv31opnUTUgbAJ_W0",authDomain:"stockflow-warehouse.firebaseapp.com",projectId:"stockflow-warehouse",storageBucket:"stockflow-warehouse.firebasestorage.app",messagingSenderId:"41703190908",appId:"1:41703190908:web:08ad10cab8e7c402fc74f9"};
firebase.initializeApp(cfg);
var db=firebase.firestore();
async function setup(){
  var btn=document.getElementById('btn');
  var ok=document.getElementById('ok');
  var err=document.getElementById('err');
  btn.disabled=true;
  try{
    var existing=await db.collection('test_users').where('username','==','admin').get();
    if(!existing.empty){ok.style.display='block';ok.innerHTML='&#10003; Test admin already exists!<br><br><strong>Username: admin</strong><br><strong>Password: admin123</strong>';return;}
    await db.collection('test_users').add({username:'admin',password:'admin123',role:'admin',created:new Date().toISOString()});
    ok.style.display='block';
  }catch(e){
    err.style.display='block';err.textContent='Error: '+e.message;btn.disabled=false;
  }
}
</script></body></html>
